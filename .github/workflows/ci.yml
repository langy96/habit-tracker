name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: habit_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d habit_tracker"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/habit_tracker
      JWT_SECRET: ci-test-secret
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Initialize database schema
        run: |
          node -e "const fs=require('fs');const { Client }=require('./server/node_modules/pg');(async()=>{const sql=fs.readFileSync('server/src/db/schema.sql','utf8');const client=new Client({connectionString:process.env.DATABASE_URL});await client.connect();await client.query(sql);await client.end();})();"

      - name: Run server tests
        run: npm --prefix server test

      - name: Run client lint
        run: npm --prefix client run lint

      - name: Run client tests
        run: npm --prefix client test -- --run
